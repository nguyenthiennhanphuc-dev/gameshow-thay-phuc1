<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Host - Đấu Giá Sự Thật</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; text-align: center; background: #2c3e50; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .card { background: white; color: #333; max-width: 100% !important; width: 100%; margin: 0 !important; border-radius: 0 !important; min-height: 100vh; padding: 30px 50px; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; color: white; transition: 0.2s; }
        button:hover { transform: scale(1.02); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: 'Nunito'; }
        #pinDisplay { font-size: 60px; font-weight: 900; color: #f1c40f; letter-spacing: 5px; margin: 10px 0; }
        .player-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; list-style: none; padding: 0; }
        .player-item { background: #ecf0f1; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 18px; color: #2c3e50; border: 2px solid #bdc3c7; }
        .money { color: #27ae60; font-weight: 900; }
        .live-bid { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 15px; display: none; border: 2px dashed #ffeeba;}
        
        .tab-btn { flex: 1; padding: 12px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; color: white; }
        .tab-active { background: #8e44ad; }
        .tab-inactive { background: #95a5a6; }
    </style>
</head>
<body>
    <h1 style="color: #f1c40f; font-size: 40px; margin-top: 0;">🔨 SÀN ĐẤU GIÁ SIÊU TỐC 🔨</h1>

    <div id="setupArea" class="card">
        <h2>Khởi tạo sàn đấu giá</h2>
        <button id="btnCreateRoom" style="background: #e74c3c; width: 100%; font-size: 24px;">🚀 TẠO PHÒNG NGAY</button>
    </div>

    <div id="roomArea" class="card" style="display: none;">
        <h2>Học sinh truy cập và nhập mã:</h2>
        <div id="pinDisplay"></div>
        <h3>Các nhà đầu tư (<span id="playerCount">0</span>)</h3>
        <ul id="players" class="player-list"></ul>
    </div>

    <div id="controlArea" class="card" style="display: none; background: #fdfbfb;">
        <h2 style="color: #8e44ad; margin-top:0;">🎙️ BÀN ĐIỀU KHIỂN CỦA HOST</h2>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tabTruth" class="tab-btn tab-active" onclick="switchTab('truth')">📝 Câu hỏi Nhập tay</button>
            <button id="tabBank" class="tab-btn tab-inactive" onclick="switchTab('bank')">📁 Chọn từ Kho đề</button>
        </div>

        <div id="areaTruth">
            <div style="text-align: left; background: #f4f6f7; padding: 15px; border-radius: 10px; border: 1px solid #d5dbdb;">
                <label><b>Nhập một Câu hỏi / Lời nhận định:</b></label>
                <input type="text" id="itemStatement" placeholder="Ví dụ: Cá mập là động vật có vú.">
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label><b>Sự thật hay Cú lừa?</b></label>
                        <select id="itemIsTrue">
                            <option value="true">✅ Sự Thật (Đúng)</option>
                            <option value="false">❌ Cú Lừa (Sai)</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label><b>Thưởng nếu ĐÚNG:</b></label>
                        <input type="number" id="itemReward" value="1000">
                    </div>
                </div>
            </div>
            <button id="btnStartItem" style="background: #27ae60; width: 100%; margin-top: 20px;">📢 LÊN SÀN! BẮT ĐẦU ĐẤU GIÁ</button>
        </div>

        <div id="areaBank" style="display: none; text-align: left;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px; background: #e8f8f5; padding: 10px; border-radius: 8px; border: 1px dashed #1abc9c;">
                <label style="color: #16a085;"><b>Tiền thưởng nếu nhóm trả lời ĐÚNG:</b></label>
                <input type="number" id="bankReward" value="3000" style="width: 150px; margin:0; border-color: #1abc9c; color: #16a085; font-weight: bold;">
            </div>
            
            <div id="quizBankLoader" style="color: #2980b9; font-weight: bold; text-align: center; padding: 20px;">⏳ Đang tải kho đề từ đám mây...</div>
            <div id="quizList" style="display: flex; flex-direction: column; gap: 10px;"></div>
            
            <div id="questionList" style="display: none; flex-direction: column; gap: 10px;">
                <button onclick="backToQuizList()" style="background: #7f8c8d; padding: 8px 15px; font-size: 15px; width: fit-content; margin-bottom: 10px;">🔙 Quay lại danh sách đề</button>
                <div id="qListContent" style="max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>
            </div>
        </div>

        <div id="currentAuctionItemDisplay" style="display: none; background: #fff; padding: 20px; border-radius: 15px; border: 4px dashed #9b59b6; margin-bottom: 20px; text-align: center;"></div>
        <div id="liveBidDisplay" class="live-bid">Đang chờ người ra giá...</div>
        
        <button id="btnEndTruth" style="background: #e74c3c; width: 100%; margin-top: 20px; display: none;">🛑 CHỐT GIÁ & CÔNG BỐ SỰ THẬT</button>
        <button id="btnLockQuestion" style="background: #d35400; width: 100%; margin-top: 20px; display: none;">🔒 CHỐT GIÁ & GIAO QUYỀN TRẢ LỜI</button>

        <div id="judgingArea" style="display: none; background: #e8f8f5; padding: 20px; border-radius: 15px; border: 4px solid #1abc9c; margin-top: 15px;">
            <div id="judgingText"></div>
            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <button onclick="submitJudgment(true)" style="background: #27ae60; flex: 1; padding: 20px; font-size: 30px; border-radius: 15px; font-weight: 900;">✅ TRẢ LỜI ĐÚNG</button>
                <button onclick="submitJudgment(false)" style="background: #c0392b; flex: 1; padding: 20px; font-size: 30px; border-radius: 15px; font-weight: 900;">❌ TRẢ LỜI SAI</button>
            </div>
        </div>
        
        <div id="resultDisplay" style="margin-top: 20px; font-size: 22px; font-weight: bold; padding: 15px; border-radius: 10px; display: none;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentPin = '';

        function buildFullQuestionHTML(qData) {
            let html = `<h3 style="color:#2c3e50; font-size: 32px; margin-top:0; margin-bottom: 15px; line-height: 1.4; padding: 0 10px;">${qData.question}</h3>`;
            
            let imgs = qData.images || [];
            let caps = qData.captions || [];
            if(imgs.length === 0 && qData.mainImage) imgs = [qData.mainImage];

            if (imgs.length > 0) {
                let gridCols = imgs.length === 1 ? '1fr' : '1fr 1fr';
                let imgMaxHeight = imgs.length > 2 ? '22vh' : '32vh'; // Giới hạn chiều cao ảnh cực kỳ quan trọng
                html += `<div style="display: grid; grid-template-columns: ${gridCols}; gap: 15px; justify-content: center; margin: 0 auto 20px auto; width: 95%; max-width: 900px;">`;
                imgs.forEach((url, i) => {
                    html += `<div style="background: #f4f6f7; border-radius: 12px; overflow: hidden; border: 2px solid #bdc3c7; display: flex; flex-direction: column;">
                                <img src="${url}" style="width: 100%; height: ${imgMaxHeight}; object-fit: contain; background: #fff;">`;
                    if (caps[i]) { html += `<div style="padding: 8px; font-weight: bold; color: #1565C0; font-size: 20px;">${caps[i]}</div>`; }
                    html += `</div>`;
                });
                html += `</div>`;
            }

            if (qData.type === 'multiple_choice' || qData.type === 'true_false') {
                html += `<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; width: 95%; max-width: 1100px; margin: 0 auto;">`;
                const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71'];
                (qData.answers || []).forEach((ans, i) => {
                    html += `<div style="background:${colors[i%4]}; color:white; padding: 15px 20px; border-radius: 12px; font-weight:bold; font-size: 26px; flex: 1; min-width: 40%; box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">${ans}</div>`;
                });
                html += `</div>`;
            }
            return html;
        }
        let currentMode = 'truth'; // 'truth' hoặc 'bank'
        const currentUser = localStorage.getItem('teacherUsername');
        let loadedQuizzes = [];

        document.getElementById('btnCreateRoom').onclick = () => { socket.emit('auc_createRoom'); };

        socket.on('auc_roomCreated', (pin) => {
            currentPin = pin;
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('roomArea').style.display = 'block';
            document.getElementById('controlArea').style.display = 'block';
            document.getElementById('pinDisplay').innerText = pin;
        });

        socket.on('auc_updatePlayers', (players) => {
            const list = document.getElementById('players'); list.innerHTML = '';
            let count = 0;
            for (let id in players) {
                count++; const li = document.createElement('li'); li.className = 'player-item';
                li.innerHTML = `${players[id].name} - <span class="money">${players[id].balance}$</span>`;
                list.appendChild(li);
            }
            document.getElementById('playerCount').innerText = count;
        });

        // ==========================================
        // QUẢN LÝ TAB & KHO ĐỀ
        // ==========================================
        function switchTab(tab) {
            if (document.getElementById('liveBidDisplay').style.display === 'block' || document.getElementById('judgingArea').style.display === 'block') {
                alert("Đang có phiên đấu giá diễn ra! Vui lòng hoàn tất trước khi chuyển chế độ.");
                return;
            }
            currentMode = tab;
            document.getElementById('areaTruth').style.display = tab === 'truth' ? 'block' : 'none';
            document.getElementById('areaBank').style.display = tab === 'bank' ? 'block' : 'none';
            document.getElementById('tabTruth').className = tab === 'truth' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tabBank').className = tab === 'bank' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            
            if (tab === 'bank' && loadedQuizzes.length === 0) loadAuctionBank();
        }

        async function loadAuctionBank() {
            if (!currentUser) {
                document.getElementById('quizBankLoader').innerText = "⚠️ Bạn chưa đăng nhập! Hãy quay lại Bảng điều khiển Giáo viên để đăng nhập trước nhé.";
                return;
            }
            try {
                const res = await fetch('/api/quizzes?username=' + currentUser);
                const data = await res.json();
                loadedQuizzes = Array.isArray(data) ? data : [];
                renderQuizList();
            } catch(err) { document.getElementById('quizBankLoader').innerText = "Lỗi tải kho đề: " + err.message; }
        }

        function renderQuizList() {
            document.getElementById('quizBankLoader').style.display = 'none';
            const list = document.getElementById('quizList'); list.innerHTML = '';
            if(loadedQuizzes.length === 0) { list.innerHTML = "<i style='color:#7f8c8d;'>Kho đề của bạn đang trống!</i>"; return; }
            
            loadedQuizzes.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.innerText = `📁 ${q.name} (${q.data.length} câu)`;
                btn.style.background = '#34495e'; btn.style.textAlign = 'left';
                btn.onclick = () => renderQuestionList(idx);
                list.appendChild(btn);
            });
            document.getElementById('quizList').style.display = 'flex';
            document.getElementById('questionList').style.display = 'none';
        }

        function backToQuizList() {
            document.getElementById('quizList').style.display = 'flex';
            document.getElementById('questionList').style.display = 'none';
        }

        function renderQuestionList(quizIdx) {
            document.getElementById('quizList').style.display = 'none';
            document.getElementById('questionList').style.display = 'flex';
            const qList = document.getElementById('qListContent'); qList.innerHTML = '';
            
            const questions = loadedQuizzes[quizIdx].data;
            questions.forEach((q, qIdx) => {
                const wrap = document.createElement('div');
                wrap.style.background = '#ecf0f1'; wrap.style.padding = '15px'; wrap.style.borderRadius = '8px'; wrap.style.marginBottom = '10px'; wrap.style.borderLeft = '5px solid #3498db';
                
                // Tiêu đề rút gọn (Luôn hiện)
                const titleRow = document.createElement('div');
                titleRow.style.display = 'flex'; titleRow.style.justifyContent = 'space-between'; titleRow.style.alignItems = 'center'; titleRow.style.cursor = 'pointer';
                
                const shortQ = q.question.length > 50 ? q.question.substring(0, 50) + "..." : q.question;
                const title = document.createElement('div');
                title.innerHTML = `<b>Câu ${qIdx+1}:</b> ${shortQ}`;
                title.style.color = '#2c3e50'; title.style.fontSize = '18px';
                
                const toggleIcon = document.createElement('div');
                toggleIcon.innerText = '\u25bc'; toggleIcon.style.fontWeight = 'bold'; toggleIcon.style.color = '#3498db';
                
                titleRow.appendChild(title); titleRow.appendChild(toggleIcon);
                wrap.appendChild(titleRow);

                // Phần nội dung chi tiết (Mặc định ẨN)
                const detailDiv = document.createElement('div');
                detailDiv.className = 'q-detail-content';
                detailDiv.style.display = 'none'; detailDiv.style.marginTop = '15px'; detailDiv.style.borderTop = '1px solid #bdc3c7'; detailDiv.style.paddingTop = '15px';

                const fullQ = document.createElement('div');
                fullQ.innerHTML = `<b>Nội dung:</b> ${q.question}`; fullQ.style.marginBottom = '10px'; fullQ.style.fontSize = '16px'; fullQ.style.color = '#333';
                detailDiv.appendChild(fullQ);

                const btnAuction = document.createElement('button');
                btnAuction.innerText = '📢 Đưa câu này lên sàn đấu giá!';
                btnAuction.style.background = '#27ae60'; btnAuction.style.fontSize = '16px'; btnAuction.style.padding = '10px 15px'; btnAuction.style.width = '100%';
                
                btnAuction.onclick = () => {
                    const reward = parseInt(document.getElementById('bankReward').value) || 3000;
                    socket.emit('auc_startQuestion', { pin: currentPin, questionData: q, reward: reward });
                    
                    document.getElementById('areaBank').style.display = 'none';
                    document.getElementById('liveBidDisplay').style.display = 'block';
                    document.getElementById('liveBidDisplay').innerText = "Đang chờ các nhóm ra giá...";
                    document.getElementById('btnLockQuestion').style.display = 'block';
                    document.getElementById('resultDisplay').style.display = 'none';

                    // Hiển thị câu hỏi + ảnh lên màn hình Giáo viên lúc đấu giá (dùng hàm dùng chung)
                    const itemDisplay = document.getElementById('currentAuctionItemDisplay');
                    itemDisplay.innerHTML = buildFullQuestionHTML(q);
                    itemDisplay.style.display = 'block';
                };
                detailDiv.appendChild(btnAuction);
                wrap.appendChild(detailDiv);

                // Logic click để Ẩn/Hiện
                titleRow.onclick = () => {
                    const isHidden = detailDiv.style.display === 'none';
                    // Thu gọn tất cả các câu khác lại
                    document.querySelectorAll('.q-detail-content').forEach(d => d.style.display = 'none');
                    document.querySelectorAll('.q-toggle-icon').forEach(i => i.innerText = '\u25bc');
                    if (isHidden) { detailDiv.style.display = 'block'; toggleIcon.innerText = '\u25b2'; }
                };
                toggleIcon.className = 'q-toggle-icon';
                qList.appendChild(wrap);
            });
        }

        // ==========================================
        // LOGIC CHẾ ĐỘ 1: NHẬP TAY (SỰ THẬT)
        // ==========================================
        document.getElementById('btnStartItem').onclick = () => {
            const statement = document.getElementById('itemStatement').value.trim();
            if (!statement) { alert("Vui lòng nhập lời nhận định!"); return; }
            const isTrue = document.getElementById('itemIsTrue').value === 'true';
            const reward = parseInt(document.getElementById('itemReward').value);

            socket.emit('auc_startItem', { pin: currentPin, statement, isTrue, trueReward: reward });
            
            document.getElementById('areaTruth').style.display = 'none';
            document.getElementById('btnEndTruth').style.display = 'block';
            document.getElementById('liveBidDisplay').style.display = 'block';
            document.getElementById('liveBidDisplay').innerText = "Đang chờ người ra giá...";
            document.getElementById('resultDisplay').style.display = 'none';
        };

        document.getElementById('btnEndTruth').onclick = () => { socket.emit('auc_endItem', currentPin); };

        // ==========================================
        // LOGIC CHẾ ĐỘ 2: ĐẤU GIÁ KHO ĐỀ
        // ==========================================
        document.getElementById('btnLockQuestion').onclick = () => { socket.emit('auc_lockBidAndAnswer', currentPin); };

        // Server báo có người thắng -> Hiển thị Bàn chấm điểm cho Giáo viên
        socket.on('auc_waitingForWinner', (data) => {
            document.getElementById('liveBidDisplay').style.display = 'none';
            document.getElementById('btnLockQuestion').style.display = 'none';
            document.getElementById('judgingArea').style.display = 'block';
            
            // LỆNH ẨN MÃ PHÒNG Ở ĐÂY
            document.getElementById('roomArea').style.display = 'none';
            document.getElementById('currentAuctionItemDisplay').style.display = 'none';
            
            let qData = data.questionData;
            if (!qData) {
                document.getElementById('judgingText').innerHTML = `🎙️ Hãy yêu cầu nhóm <b>[${data.winnerName}]</b> đọc đáp án!`;
                return;
            }

            document.getElementById('judgingText').innerHTML = `
                <div style="background:#fff; padding: 25px; border-radius: 15px; border: 4px dashed #3498db; margin-bottom: 20px; text-align: center;">
                    ${buildFullQuestionHTML(qData)}
                </div>
                <div style="font-size: 26px; margin-bottom: 10px;">🎙️ Yêu cầu nhóm <b style="font-size: 32px; color: #d35400;">[${data.winnerName}]</b> đọc đáp án! 
                <span style="font-size: 22px; color:#e67e22;">(Giá mua: ${data.bidAmount}$)</span></div>
            `;
        });
        function submitJudgment(isCorrect) {
            socket.emit('auc_submitWinnerAnswer', { pin: currentPin, isCorrect: isCorrect });
        }

        // ==========================================
        // DÙNG CHUNG CẢ 2 CHẾ ĐỘ
        // ==========================================
        socket.on('auc_newHighestBid', (data) => {
            document.getElementById('liveBidDisplay').innerHTML = `🔥 Nhóm <b>[${data.bidderName}]</b> đang dẫn đầu với mức giá: <span style="color:#e74c3c; font-size:28px;">${data.amount}$</span>`;
        });

        socket.on('auc_itemEnded', handleAuctionEnd);
        socket.on('auc_questionEnded', handleAuctionEnd);

        function handleAuctionEnd(data) {
            document.getElementById('liveBidDisplay').style.display = 'none';
            document.getElementById('btnEndTruth').style.display = 'none';
            document.getElementById('btnLockQuestion').style.display = 'none';
            document.getElementById('judgingArea').style.display = 'none';
            document.getElementById('roomArea').style.display = 'block'; // Hiện lại mã phòng
            document.getElementById('currentAuctionItemDisplay').style.display = 'none';
            
            // Khôi phục lại Tab đang chơi
            document.getElementById('areaTruth').style.display = currentMode === 'truth' ? 'block' : 'none';
            document.getElementById('areaBank').style.display = currentMode === 'bank' ? 'block' : 'none';

            const resDiv = document.getElementById('resultDisplay');
            resDiv.style.display = 'block';
            resDiv.innerText = data.resultMsg;
            if (data.resultMsg.includes('SỰ THẬT') || data.resultMsg.includes('XUẤT SẮC')) {
                resDiv.style.background = '#d4edda'; resDiv.style.color = '#155724';
            } else if (data.resultMsg.includes('CÚ LỪA') || data.resultMsg.includes('RẤT TIẾC')) {
                resDiv.style.background = '#f8d7da'; resDiv.style.color = '#721c24';
            } else {
                resDiv.style.background = '#e2e3e5'; resDiv.style.color = '#383d41';
            }
        }
    </script>
</body>
</html>
